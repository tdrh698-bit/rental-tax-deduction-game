<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住房租金扣除游戏 - 一键启动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .launch-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        h1 {
            color: #1E5AA8;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .game-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .game-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-color: #1E5AA8;
        }
        
        .game-card.recommended {
            background: linear-gradient(135deg, #1E5AA8 0%, #2a6bc5 100%);
            color: white;
        }
        
        .game-card.recommended .game-title {
            color: white;
        }
        
        .game-card.recommended .game-desc {
            color: rgba(255, 255, 255, 0.9);
        }
        
        .game-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #1E5AA8;
        }
        
        .game-card.recommended .game-icon {
            color: white;
        }
        
        .game-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        
        .game-desc {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        
        .launch-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .launch-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        .launch-btn.recommended {
            background: #FF9800;
        }
        
        .launch-btn.recommended:hover {
            background: #f57c00;
        }
        
        .server-info {
            background: #f0f7ff;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            text-align: left;
        }
        
        .server-info h3 {
            color: #1E5AA8;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #666;
            font-weight: 500;
        }
        
        .info-value {
            color: #333;
            font-weight: 600;
        }
        
        .info-value.online {
            color: #4CAF50;
        }
        
        .info-value.offline {
            color: #F44336;
        }
        
        .quick-links {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        .quick-links h3 {
            color: #666;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .link-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .link-item {
            background: #f5f5f5;
            padding: 8px 16px;
            border-radius: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        
        .link-item:hover {
            background: #e0e0e0;
            color: #333;
        }
        
        @media (max-width: 768px) {
            .launch-container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .game-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="launch-container">
        <h1>🏠 住房租金扣除通关游戏</h1>
        <p class="subtitle">一个教育性的HTML游戏，帮助您学习住房租金扣除政策，掌握申报技巧</p>
        
        <div class="game-options">
            <div class="game-card recommended">
                <div class="game-icon">
                    <i class="fas fa-rocket"></i>
                </div>
                <div class="game-title">自动跳转优化版</div>
                <div class="game-desc">推荐版本！自动跳转+正确提示+全年计算+可选择模式</div>
                <button class="launch-btn recommended" onclick="launchGame('auto-advance-game.html')">
                    <i class="fas fa-play"></i> 立即开始游戏
                </button>
            </div>
            
            <div class="game-card">
                <div class="game-icon">
                    <i class="fas fa-home"></i>
                </div>
                <div class="game-title">游戏首页导航</div>
                <div class="game-desc">完整导航页面，包含所有版本和游戏数据</div>
                <button class="launch-btn" onclick="launchGame('game-homepage.html')">
                    <i class="fas fa-compass"></i> 查看导航页
                </button>
            </div>
            
            <div class="game-card">
                <div class="game-icon">
                    <i class="fas fa-gamepad"></i>
                </div>
                <div class="game-title">稳定可操作版</div>
                <div class="game-desc">基础稳定版本，适合快速测试和体验</div>
                <button class="launch-btn" onclick="launchGame('working-game.html')">
                    <i class="fas fa-play-circle"></i> 启动游戏
                </button>
            </div>
        </div>
        
        <div class="server-info">
            <h3><i class="fas fa-server"></i> 服务器状态</h3>
            <div class="info-item">
                <span class="info-label">服务器地址:</span>
                <span class="info-value">43.153.117.19:3000</span>
            </div>
            <div class="info-item">
                <span class="info-label">运行状态:</span>
                <span class="info-value online" id="server-status">检测中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">启动时间:</span>
                <span class="info-value" id="server-uptime">--</span>
            </div>
            <div class="info-item">
                <span class="info-label">游戏文件数:</span>
                <span class="info-value" id="file-count">--</span>
            </div>
        </div>
        
        <div class="quick-links">
            <h3>快速链接</h3>
            <div class="link-list">
                <a href="game-main-complete.html" class="link-item">完整通关版</a>
                <a href="picture-version.html" class="link-item">图片版本</a>
                <a href="final-integrated-game.html" class="link-item">集成优化版</a>
                <a href="restored-game.html" class="link-item">数据恢复页</a>
                <a href="new-design-game.html" class="link-item">全新设计版</a>
                <a href="test-game.html" class="link-item">功能测试</a>
            </div>
        </div>
    </div>

    <script>
        // 启动游戏
        function launchGame(gameFile) {
            console.log('启动游戏:', gameFile);
            window.open(gameFile, '_blank');
            
            // 添加启动反馈
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在打开...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 2000);
        }
        
        // 检查服务器状态
        async function checkServerStatus() {
            try {
                const response = await fetch('/');
                if (response.ok) {
                    document.getElementById('server-status').textContent = '✅ 在线';
                    document.getElementById('server-status').className = 'info-value online';
                } else {
                    document.getElementById('server-status').textContent = '⚠️ 异常';
                    document.getElementById('server-status').className = 'info-value offline';
                }
            } catch (error) {
                document.getElementById('server-status').textContent = '❌ 离线';
                document.getElementById('server-status').className = 'info-value offline';
            }
        }
        
        // 获取服务器运行时间
        function getServerUptime() {
            // 这里可以添加获取实际运行时间的逻辑
            // 目前显示一个估计值
            const now = new Date();
            const start = new Date(now);
            start.setHours(start.getHours() - 2); // 假设运行了2小时
            const diff = now - start;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            
            document.getElementById('server-uptime').textContent = 
                `${hours}小时${minutes}分钟`;
        }
        
        // 获取文件数量
        async function getFileCount() {
            try {
                const response = await fetch('/?list');
                if (response.ok) {
                    // 简单估计文件数量
                    document.getElementById('file-count').textContent = '30+ 个HTML文件';
                }
            } catch (error) {
                document.getElementById('file-count').textContent = '--';
            }
        }
        
        // 页面加载完成
        window.onload = function() {
            console.log('一键启动页面加载完成');
            
            // 检查服务器状态
            checkServerStatus();
            
            // 获取服务器信息
            getServerUptime();
            getFileCount();
            
            // 每30秒检查一次服务器状态
            setInterval(checkServerStatus, 30000);
        };
        
        // 添加键盘快捷键
        document.addEventListener('keydown', function(event) {
            // 按1键启动推荐游戏
            if (event.key === '1') {
                launchGame('auto-advance-game.html');
            }
            // 按2键打开导航页
            else if (event.key === '2') {
                launchGame('game-homepage.html');
            }
            // 按3键打开稳定版
            else if (event.key === '3') {
                launchGame('working-game.html');
            }
        });
    </script>
</body>
</html>
